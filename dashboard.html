<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

<!-- NAVBAR -->

<nav class="navbar">
    <div class="nav-left">
    <img src="assets/github-logo.png" alt="">

  <h2>GitHub Issues Tracker</h2>
  </div>

<div class="search-box">

<input type="text" id="searchInput" placeholder="Search issues...">

<button onclick="searchIssue()">+New Issue</button>
</div>


</nav>

<div class="tabs">

<button onclick="filterIssues('all')" class="tab-btn active">All</button>
<button onclick="filterIssues('open')" class="tab-btn">Open</button>
<button onclick="filterIssues('closed')" class="tab-btn">Closed</button>
</div>


<!-- HEADER -->

<div class="issues-header">

<div class="left">

<div class="icon">⚙</div>

<div>
<h3 id="count">0 Issues</h3>
<p>Track and manage your project issues</p>
</div>

</div>

<div class="right">
<span><span class="dot open"></span>Open</span>
<span><span class="dot closed"></span>Closed</span>
</div>

</div>

<!-- loading -->

 <div id="loader" style="display:none">Loading...</div>

<!-- ISSUE CARDS -->

<div id="container" class="grid"></div>


<!-- MODAL -->

<div id="modal" class="modal hidden">
<div class="modal-box" id="modalContent"></div>
</div>


<script src="script/dashboard.js"></script>

</body>
</html>
